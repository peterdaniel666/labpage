  bio: Yihan Wu is an Assistant Professor at the School of Life Sciences at Nanjing University. His lab works on microbe-associated bioactive peptides and metabolites, including those produced by microorganisms as well as those they encounter during interactions with their environment. The lab integrates synthetic biology, chemical biology, advanced metabolomics, and AI to uncover novel metabolites and pathways, while leveraging AI-driven design and engineered microbes to accelerate the development of innovative therapeutics. Yihan received a PhD in Chemistry from Princeton University, and was a Senior Scientist at WuXi Biologics.

