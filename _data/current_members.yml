  current_position: Principal Investigator
  education:
    - "PhD: Princeton University, 2013-2018"
    - "Bachelor: Nanjing University, 2009-2013"
  email: yihanpeter2018(AT)163(dot)com
  bio: Yihan Wu is affiliated with the School of Life Sciences and the Chemistry and Biomedicine Innovation Center at Nanjing University. His lab works on microbe-associated bioactive peptides and metabolites, including those produced by microorganisms as well as those they encounter during interactions with their environment. The lab integrates synthetic biology, chemical biology, advanced metabolomics, and AI to uncover novel metabolites and pathways, while leveraging AI-driven design and engineered microbes to accelerate the development of innovative therapeutics. Yihan received a PhD in Chemistry from Princeton University, and was a Senior Scientist at WuXi Biologics.

- name: Kai Jin
  photo: KaiJin.jpg
  current_position: PhD student 
  bio: My research sits at the intersection of synthetic biology and cancer therapy. I focus on engineering bacteria as programmable living therapeutics that can sense the tumor microenvironment and release therapeutic molecules directly at the tumor site. I'm especially interested in building synthetic biological systems that combine different treatment strategies, like phototherapy and immunotherapy, to make cancer therapies more precise and effective. Outside the lab, I enjoy playing badminton, going for a jog, and exploring new places.

- name: Yi Huang
  photo: YiHuang.jpg
  current_position: Master student
  bio: I love drawing, reading novels, and traveling. I'm a huge fan of Lay Zhang, and I dream of becoming someone as cool and inspiring as him. I'm currently working on discovering new bioactive peptides and using genetically engineered microbes to biosynthesize antimicrobial peptides. I hope to develop live bacterial drugs and make them cheaper and more accessible than those produced through traditional chemical synthesis.