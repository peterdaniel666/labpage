# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely need to edit after that.
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'jekyll serve'. If you change this file, please restart the server process.

# Site settings
title: Wu Lab | Nanjing University
tagline: >
  SynThera Group
  synthetic biology, chemistry, microbiology, biomedical engineering, metabolomics, and AI to discover new chemistry, biology, and drugs.
email: yihandaniel@gmail.com
description: > # this means to ignore newlines until "baseurl:"
  The Group is based at the Chemistry and Biomedical Innovation Center and School of Life Sciences at Nanjing University. It conducts research in synthetic biology, chemistry, microbiology, biomedical engineering, metabolomics, and artificial intelligence to uncover novel chemical and biological insights and develop innovative therapeutics.
baseurl: "/labpage"
url: "https://peterdaniel666.github.io"
lang: en_GB

include:
  - .htaccess
  - _pages

sass:
  sass_dir: _sass

# Conversion
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

# Markdown Processing
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false
  parse_block_html: true # default for kramdown is false. This will enable using Markdown links

plugins:
  - jekyll-seo-tag
